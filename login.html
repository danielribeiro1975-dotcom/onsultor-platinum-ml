<script>
/* Safe storage shim — evita crash em modo privado/cookies bloqueados */
(function(){
  try {
    var t='__cp_test__'; window.localStorage.setItem(t,'1'); window.localStorage.removeItem(t);
  } catch(e){
    var mem={};
    try {
      Object.defineProperty(window,'localStorage',{value:{
        getItem:function(k){return mem.hasOwnProperty(k)?mem[k]:null;},
        setItem:function(k,v){mem[k]=String(v);},
        removeItem:function(k){delete mem[k];},
        clear:function(){mem={};}
      },configurable:true});
    } catch(_){}
  }
})();
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a1628;--surface:#0f1f3d;--border:#1a2f52;--gold:#FFD700;--text:#e2e8f0;--muted:#64748b;--red:#ef4444;}
body{
  background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
  background-image:radial-gradient(ellipse at 40% 100%,rgba(255,215,0,0.05) 0%,transparent 60%);
}
.logo{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,#f4f6fa 0%,#aeb8c8 45%,#e8edf4 55%,#8995a8 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.02em;margin-bottom:32px;text-align:center;}
.logo span{color:#fff;}
.logo-sub{font-size:0.72rem;color:var(--muted);font-weight:400;display:block;margin-top:4px;}

.card{background:var(--surface);border:1px solid var(--border);padding:40px 36px;width:100%;max-width:400px;position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

.card-title{font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:6px;}
.card-sub{font-size:0.8rem;color:var(--muted);margin-bottom:28px;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);padding:12px 14px;color:#fff;font-family:'Sora',sans-serif;font-size:0.85rem;outline:none;border-radius:6px;transition:border-color 0.2s;}
.field input:focus{border-color:rgba(255,215,0,0.5);}
.field input::placeholder{color:#333;}
.field input.error{border-color:var(--red);}
.field-err{font-size:0.68rem;color:var(--red);margin-top:4px;display:none;}
.field input.error ~ .field-err{display:block;}

.pwd-wrap{position:relative;}
.pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.85rem;padding:4px;}

.forgot{text-align:right;margin-top:-8px;margin-bottom:20px;}
.forgot a{font-size:0.72rem;color:var(--muted);text-decoration:none;}
.forgot a:hover{color:var(--gold);}

.btn-primary{width:100%;background:var(--gold);color:#0a1628;border:none;padding:14px;font-family:'Sora',sans-serif;font-weight:800;font-size:0.9rem;cursor:pointer;border-radius:6px;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary:hover{background:#ffdc6b;transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,215,0,0.3);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}

.err-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);padding:12px 16px;border-radius:6px;font-size:0.78rem;color:#fca5a5;margin-bottom:16px;display:none;}
.err-box.show{display:block;}

.register-link{text-align:center;font-size:0.78rem;color:var(--muted);margin-top:20px;}
.register-link a{color:var(--gold);text-decoration:none;font-weight:600;}
.register-link a:hover{text-decoration:underline;}

.loading-overlay{display:none;position:fixed;inset:0;background:rgba(10,22,40,0.9);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-overlay.show{display:flex;}
.spinner{width:44px;height:44px;border:3px solid rgba(255,215,0,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:0.85rem;color:#aaa;}
.loading-msg b{color:var(--gold);}
</style>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyBQO4D_j8qeuE-M94FUgpqpG9rvyYUlM-M",
      authDomain:        "seller-guardian.firebaseapp.com",
      projectId:         "seller-guardian",
      storageBucket:     "seller-guardian.firebasestorage.app",
      messagingSenderId: "485816142226",
      appId:             "1:485816142226:web:c042b5f008b91cf51c994b"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();
  </script>

</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-msg">Verificando acesso <b>Platinum</b>...</div>
</div>

<div class="logo">
  Consultor<span>Platinum</span> ML
  <span class="logo-sub">Painel em tempo real para sellers</span>
</div>

<div class="card">
  <div class="card-title">Bem-vindo de volta</div>
  <div class="card-sub">Entre com seu e-mail e senha cadastrados.</div>

  <div class="err-box" id="errBox">E-mail ou senha incorretos. Tente novamente.</div>

  <form id="formLogin" novalidate>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email"/>
      <div class="field-err">E-mail inválido</div>
    </div>

    <div class="field">
      <label>Senha</label>
      <div class="pwd-wrap">
        <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password"/>
        <button type="button" class="pwd-toggle" onclick="togglePwd()">👁️</button>
      </div>
      <div class="field-err">Campo obrigatório</div>
    </div>

    <div class="forgot">
      <a href="#" onclick="esqueceuSenha(); return false">Esqueceu a senha?</a>
    </div>

    <button type="submit" class="btn-primary" id="btnLogin">
      → Entrar no painel
    </button>
  </form>

  <div class="register-link">
    Ainda não tem conta? <a href="index.html#planos">Ver planos e começar →</a>
  </div>
</div>

<script>
function togglePwd(){
  const inp=document.getElementById('senha');
  inp.type = inp.type==='password' ? 'text' : 'password';
}

document.getElementById('formLogin').addEventListener('submit', function(e){
  e.preventDefault();
  const email=document.getElementById('email');
  const senha=document.getElementById('senha');
  const err=document.getElementById('errBox');
  let ok=true;

  email.classList.remove('error'); senha.classList.remove('error'); err.classList.remove('show');

  if(!email.value.includes('@')){email.classList.add('error');ok=false;}
  if(!senha.value){senha.classList.add('error');ok=false;}
  if(!ok)return;

  document.getElementById('loadingOverlay').classList.add('show');
  document.getElementById('btnLogin').disabled=true;

  // ── FIREBASE AUTH: login real com sessão persistente ──
  firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL)
  .then(() => auth.signInWithEmailAndPassword(email.value.trim(), senha.value))
    .then(async (cred) => {
      // Busca dados do seller no Firestore
      const snap = await db.collection('sellers').doc(cred.user.uid).get();
      const data = snap.exists ? snap.data() : {};
      localStorage.setItem('cp_user', JSON.stringify({
        uid:   cred.user.uid,
        nome:  data.nome  || '',
        email: cred.user.email,
        loja:  data.loja  || '',
        plano: data.plano || 'mensal'
      }));
      const onboarded = localStorage.getItem('cp_onboarded');
      window.location.href = onboarded ? 'app.html' : 'onboarding.html';
    })
    .catch((err) => {
      document.getElementById('loadingOverlay').classList.remove('show');
      document.getElementById('btnLogin').disabled = false;
      document.getElementById('errBox').classList.add('show');
    });
});

function esqueceuSenha(){
  const email = document.getElementById('email').value;
  if(!email){alert('Digite seu e-mail primeiro.');return;}
  alert('Se esse e-mail estiver cadastrado, você receberá as instruções em breve.');
}
</script>
</body>
</html>
